<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#141232"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <!-- Inner circle glow -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <!-- Lightning bolt / chart line -->
  <path d="M160 310 L220 220 L256 270 L310 170 L350 210" 
        fill="none" stroke="url(#bolt)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alert dot -->
  <circle cx="350" cy="210" r="18" fill="#00ff88" opacity="0.9"/>
  <circle cx="350" cy="210" r="10" fill="#fff"/>
  <!-- Small decorative dots -->
  <circle cx="160" cy="310" r="8" fill="#00d4ff" opacity="0.7"/>
</svg>
